[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = [
  "B",
  "C4",
  "E",
  "F",
  "I",
  "N",
  "PYI",
  "SIM",
  "UP",
  "W",
]
ignore = [
  "E501",
]

[tool.ruff.lint.isort]
known-first-party = ["custom_components.estofex"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
