name: Lint

on:
  push:
  pull_request:

jobs:
  ruff:
    name: Ruff
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ruff
        run: python -m pip install ruff

      - name: Run Ruff
        run: ruff check .

      - name: Check formatting
        run: ruff format --check .
